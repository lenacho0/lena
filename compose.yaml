services:
  postgres:
    image: postgres:16-alpine
    container_name: viral-video-storyboard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: viral_video_storyboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

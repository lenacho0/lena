name: Release Business Effect Confirmation

on:
  workflow_dispatch:
    inputs:
      batch_id:
        description: Batch id to verify business effect
        required: true
        default: "00000000-0000-0000-0000-000000000001"
      desired_count:
        description: Optional target script count (empty means current+1)
        required: false
        default: ""
      limit:
        description: Max queued tasks to consume in this run
        required: false
        default: "5"

jobs:
  confirm-business-effect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SCRIPT_GENERATION_API_KEY: ${{ secrets.SCRIPT_GENERATION_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      SCRIPT_GENERATION_PROVIDER: ${{ vars.SCRIPT_GENERATION_PROVIDER }}
      SCRIPT_GENERATION_MODEL: ${{ vars.SCRIPT_GENERATION_MODEL }}
      SCRIPT_GENERATION_BASE_URL: ${{ vars.SCRIPT_GENERATION_BASE_URL }}
      SCRIPT_GENERATION_TIMEOUT_MS: ${{ vars.SCRIPT_GENERATION_TIMEOUT_MS }}
      SCRIPT_GENERATION_LANGUAGE: ${{ vars.SCRIPT_GENERATION_LANGUAGE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate required runtime secrets
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "DATABASE_URL secret is required." >&2
            exit 1
          fi

          if [ -z "${SCRIPT_GENERATION_API_KEY}" ] && [ -z "${OPENAI_API_KEY}" ] && [ -z "${GEMINI_API_KEY}" ]; then
            echo "SCRIPT_GENERATION_API_KEY, OPENAI_API_KEY, or GEMINI_API_KEY secret is required." >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply migrations
        run: npm run prisma:migrate:deploy

      - name: Validate worker runtime config
        run: npm run worker:scripts:check-config

      - name: Start API for acceptance checks
        run: |
          npm run start > /tmp/vvs_api.log 2>&1 &
          echo $! > /tmp/vvs_api.pid
          sleep 2
          curl -sf http://127.0.0.1:3000/health > /tmp/vvs_health.json
          cat /tmp/vvs_health.json

      - name: Queue business-effect task
        id: queue
        env:
          BATCH_ID: ${{ github.event.inputs.batch_id }}
          DESIRED_COUNT_INPUT: ${{ github.event.inputs.desired_count }}
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/batch_detail.json -w "%{http_code}" \
  "http://127.0.0.1:3000/api/batches/${BATCH_ID}")

if [ "${HTTP_STATUS}" != "200" ]; then
  echo "batch_id=${BATCH_ID} 查询失败，HTTP=${HTTP_STATUS}"
  echo "当前可用批次列表如下："
  curl -s "http://127.0.0.1:3000/api/batches?page=1&pageSize=20" | jq .
  exit 1
fi

BEFORE_JSON=$(cat /tmp/batch_detail.json)

          BEFORE_GENERATED=$(echo "$BEFORE_JSON" | jq -r '.data.scriptGeneratedCount')
          BEFORE_VARIANTS=$(echo "$BEFORE_JSON" | jq -r '.data.scripts | length')

          if [ "${DESIRED_COUNT_INPUT}" = "" ]; then
            DESIRED_COUNT=$((BEFORE_GENERATED + 1))
          else
            DESIRED_COUNT="${DESIRED_COUNT_INPUT}"
          fi

          if ! [[ "${DESIRED_COUNT}" =~ ^[0-9]+$ ]]; then
            echo "desired_count must be integer." >&2
            exit 1
          fi

          if [ "${DESIRED_COUNT}" -lt 1 ] || [ "${DESIRED_COUNT}" -gt 50 ]; then
            echo "desired_count must be in [1, 50]." >&2
            exit 1
          fi

          if [ "${DESIRED_COUNT}" -le "${BEFORE_GENERATED}" ]; then
            echo "desired_count must be greater than current scriptGeneratedCount." >&2
            exit 1
          fi

          TRIGGER_SOURCE="gh_release_business_effect_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}"

          PAYLOAD=$(jq -n \
            --argjson desiredCount "${DESIRED_COUNT}" \
            --arg triggerSource "${TRIGGER_SOURCE}" \
            '{
              desiredCount: $desiredCount,
              priority: 999,
              maxRetries: 3,
              triggerSource: $triggerSource,
              requestPayload: {
                operator: "release_business_effect_check",
                checkId: $triggerSource
              }
            }')

          HTTP_STATUS=$(curl -s -o /tmp/queue_task.json -w "%{http_code}" \
            -X POST "http://127.0.0.1:3000/api/batches/${BATCH_ID}/script-generation-tasks" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}")

          cat /tmp/queue_task.json

          if [ "${HTTP_STATUS}" != "202" ]; then
            echo "Queue task failed with status ${HTTP_STATUS}" >&2
            exit 1
          fi

          TASK_ID=$(jq -r '.data.task.id // empty' /tmp/queue_task.json)
          if [ -z "${TASK_ID}" ]; then
            echo "Task id missing from response." >&2
            exit 1
          fi

          echo "task_id=${TASK_ID}" >> "${GITHUB_OUTPUT}"
          echo "batch_id=${BATCH_ID}" >> "${GITHUB_OUTPUT}"
          echo "before_generated=${BEFORE_GENERATED}" >> "${GITHUB_OUTPUT}"
          echo "before_variants=${BEFORE_VARIANTS}" >> "${GITHUB_OUTPUT}"

      - name: Run worker once
        run: npm run worker:scripts:once -- --limit="${{ github.event.inputs.limit }}"

      - name: Verify business effect
        env:
          TASK_ID: ${{ steps.queue.outputs.task_id }}
          BATCH_ID: ${{ steps.queue.outputs.batch_id }}
          BEFORE_GENERATED: ${{ steps.queue.outputs.before_generated }}
          BEFORE_VARIANTS: ${{ steps.queue.outputs.before_variants }}
        run: |
          AFTER_JSON=$(curl -sf "http://127.0.0.1:3000/api/batches/${BATCH_ID}")
          AFTER_GENERATED=$(echo "$AFTER_JSON" | jq -r '.data.scriptGeneratedCount')
          AFTER_VARIANTS=$(echo "$AFTER_JSON" | jq -r '.data.scripts | length')

          TASK_STATUS=$(echo "$AFTER_JSON" | jq -r --arg TASK_ID "${TASK_ID}" '[.data.tasks[] | select(.id == $TASK_ID)][0].status // "NOT_FOUND"')
          TASK_ERROR_CODE=$(echo "$AFTER_JSON" | jq -r --arg TASK_ID "${TASK_ID}" '[.data.tasks[] | select(.id == $TASK_ID)][0].errorCode // ""')
          TASK_ERROR_MESSAGE=$(echo "$AFTER_JSON" | jq -r --arg TASK_ID "${TASK_ID}" '[.data.tasks[] | select(.id == $TASK_ID)][0].errorMessage // ""')

          if [ "${TASK_STATUS}" != "SUCCEEDED" ]; then
            echo "Task not succeeded. status=${TASK_STATUS}, errorCode=${TASK_ERROR_CODE}, errorMessage=${TASK_ERROR_MESSAGE}" >&2
            exit 1
          fi

          if [ "${AFTER_GENERATED}" -le "${BEFORE_GENERATED}" ]; then
            echo "scriptGeneratedCount not increased. before=${BEFORE_GENERATED}, after=${AFTER_GENERATED}" >&2
            exit 1
          fi

          if [ "${AFTER_VARIANTS}" -le "${BEFORE_VARIANTS}" ]; then
            echo "scriptVariant count not increased. before=${BEFORE_VARIANTS}, after=${AFTER_VARIANTS}" >&2
            exit 1
          fi

          jq -n \
            --arg batchId "${BATCH_ID}" \
            --arg taskStatus "${TASK_STATUS}" \
            --argjson beforeGenerated "${BEFORE_GENERATED}" \
            --argjson afterGenerated "${AFTER_GENERATED}" \
            --argjson beforeVariants "${BEFORE_VARIANTS}" \
            --argjson afterVariants "${AFTER_VARIANTS}" \
            '{
              event: "business_effect_check_passed",
              batchId: $batchId,
              taskStatus: $taskStatus,
              beforeScriptGeneratedCount: $beforeGenerated,
              afterScriptGeneratedCount: $afterGenerated,
              beforeScriptVariantCount: $beforeVariants,
              afterScriptVariantCount: $afterVariants
            }'

      - name: Stop API
        if: always()
        run: |
          if [ -f /tmp/vvs_api.pid ]; then
            kill "$(cat /tmp/vvs_api.pid)" >/dev/null 2>&1 || true
          fi

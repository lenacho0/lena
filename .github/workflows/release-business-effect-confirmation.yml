name: Release Business Effect Confirmation

on:
  workflow_dispatch:
    inputs:
      batch_id:
        description: Batch id to verify business effect
        required: true
        default: "00000000-0000-0000-0000-000000000001"
      desired_count:
        description: Optional target script count (empty means current+1)
        required: false
        default: ""
      limit:
        description: Max queued tasks to consume in this run
        required: false
        default: "5"

jobs:
  confirm-business-effect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SCRIPT_GENERATION_API_KEY: ${{ secrets.SCRIPT_GENERATION_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      SCRIPT_GENERATION_PROVIDER: ${{ vars.SCRIPT_GENERATION_PROVIDER }}
      SCRIPT_GENERATION_MODEL: ${{ vars.SCRIPT_GENERATION_MODEL }}
      SCRIPT_GENERATION_BASE_URL: ${{ vars.SCRIPT_GENERATION_BASE_URL }}
      SCRIPT_GENERATION_TIMEOUT_MS: ${{ vars.SCRIPT_GENERATION_TIMEOUT_MS }}
      SCRIPT_GENERATION_LANGUAGE: ${{ vars.SCRIPT_GENERATION_LANGUAGE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate required runtime secrets
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "DATABASE_URL secret is required." >&2
            exit 1
          fi

          if [ -z "${SCRIPT_GENERATION_API_KEY}" ] && [ -z "${OPENAI_API_KEY}" ] && [ -z "${GEMINI_API_KEY}" ]; then
            echo "SCRIPT_GENERATION_API_KEY, OPENAI_API_KEY, or GEMINI_API_KEY secret is required." >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Apply migrations
        run: npm run prisma:migrate:deploy

      - name: Validate worker runtime config
        run: npm run worker:scripts:check-config

      - name: Queue business-effect task
        id: queue
        env:
          BATCH_ID: ${{ github.event.inputs.batch_id }}
          DESIRED_COUNT: ${{ github.event.inputs.desired_count }}
        run: |
          node --input-type=module <<'NODE'
          import fs from "node:fs";
          import { app } from "./src/app.js";
          import { prisma } from "./src/lib/prisma.js";

          const batchId = process.env.BATCH_ID;
          const desiredInput = (process.env.DESIRED_COUNT ?? "").trim();

          if (!batchId) throw new Error("batch_id is required.");

          const batch = await prisma.batch.findUnique({
            where: { id: batchId },
            select: {
              scriptGeneratedCount: true,
              productProfile: { select: { id: true } },
              batchReferenceVideos: {
                where: { isSelected: true },
                select: { id: true },
                take: 1
              }
            }
          });

          if (!batch) throw new Error(`Batch not found: ${batchId}`);
          if (!batch.productProfile) throw new Error(`Batch ${batchId} has no productProfile.`);
          if (batch.batchReferenceVideos.length === 0) throw new Error(`Batch ${batchId} has no selected reference video.`);

          const beforeScriptGeneratedCount = batch.scriptGeneratedCount;
          let desiredCount = beforeScriptGeneratedCount + 1;

          if (desiredInput !== "") {
            const parsed = Number.parseInt(desiredInput, 10);
            if (Number.isNaN(parsed) || parsed < 1 || parsed > 50) {
              throw new Error("desired_count must be an integer between 1 and 50.");
            }
            desiredCount = parsed;
          }

          if (desiredCount <= beforeScriptGeneratedCount) {
            throw new Error(`desired_count (${desiredCount}) must be greater than current scriptGeneratedCount (${beforeScriptGeneratedCount}).`);
          }

          const beforeScriptVariantCount = await prisma.scriptVariant.count({
            where: { batchId }
          });

          const triggerSource = `gh_release_business_effect_${Date.now()}`;
          const response = await app.request(`http://localhost/api/batches/${batchId}/script-generation-tasks`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              desiredCount,
              priority: 999,
              maxRetries: 3,
              triggerSource,
              requestPayload: {
                operator: "release_business_effect_check",
                checkId: triggerSource
              }
            })
          });

          const json = await response.json().catch(() => null);
          if (response.status !== 202) {
            throw new Error(`Failed to create task: ${json?.error?.message ?? `HTTP ${response.status}`}`);
          }

          const taskId = json?.data?.task?.id;
          if (!taskId) throw new Error("Task id missing from response.");

          console.log(JSON.stringify({
            event: "business_effect_task_queued",
            batchId,
            taskId,
            desiredCount,
            beforeScriptGeneratedCount,
            beforeScriptVariantCount
          }));

          const outputFile = process.env.GITHUB_OUTPUT;
          if (outputFile) {
            fs.appendFileSync(outputFile, `task_id=${taskId}\n`);
            fs.append
